{{- range $name, $service := .Values.services }}
{{- if and $service.enabled (eq $service.type "stateless") }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "erp-uno.labels" $ | nindent 4 }}
    service: {{ $name }}
spec:
  replicas: {{ $service.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "erp-uno.serviceSelectorLabels" (merge (dict "service" $name) $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erp-uno.serviceSelectorLabels" (merge (dict "service" $name) $) | nindent 8 }}
    spec:
      serviceAccountName: {{ $.Values.namespace }}-sa
      imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
      containers:
      - name: {{ $name }}
        image: {{ $.Values.global.registry }}/{{ $service.image }}
        imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
        {{- if $service.port }}
        ports:
        - name: http
          containerPort: {{ $service.port }}
          protocol: TCP
        {{- else if $service.ports }}
        ports:
        {{- range $portName, $portNum := $service.ports }}
        - name: {{ $portName }}
          containerPort: {{ $portNum }}
          protocol: TCP
        {{- end }}
        {{- end }}
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        {{- if $service.backend }}
        - name: KVS_BACKEND
          value: {{ $service.backend }}
        {{- end }}
        {{- if $service.gpu.enabled }}
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        {{- end }}
        {{- if and $service.probes.enabled (ne $service.name "ns-dns") }}
        livenessProbe:
          httpGet:
            path: {{ $service.probes.path | default "/health" }}
            port: http
          initialDelaySeconds: {{ $service.probes.initialDelaySeconds | default 10 }}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: {{ $service.probes.path | default "/health" }}
            port: http
          initialDelaySeconds: {{ $service.probes.initialDelaySeconds | default 5 }}
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        {{- end }}
        {{- include "erp-uno.resources" (merge (dict "type" "stateless" "resources" $service.resources "defaults" $.Values.global.defaults) $) | nindent 8 }}
        {{- if $service.gpu.enabled }}
        resources:
          requests:
            cpu: {{ $service.resources.requests.cpu }}
            memory: {{ $service.resources.requests.memory }}
            {{ $service.gpu.resourceName }}: {{ $service.gpu.limit }}
          limits:
            cpu: {{ $service.resources.limits.cpu }}
            memory: {{ $service.resources.limits.memory }}
            {{ $service.gpu.resourceName }}: {{ $service.gpu.limit }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: service
                  operator: In
                  values:
                  - {{ $name }}
              topologyKey: kubernetes.io/hostname
{{- end }}
{{- end }}
