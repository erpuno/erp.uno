{{- if .Values.rbac.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.namespace }}-sa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erp-uno.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.namespace }}-role
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erp-uno.labels" . | nindent 4 }}
rules:
- apiGroups: [""]
  resources: ["pods", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.namespace }}-rolebinding
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erp-uno.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.namespace }}-role
subjects:
- kind: ServiceAccount
  name: {{ .Values.namespace }}-sa
  namespace: {{ .Values.namespace }}
{{- end }}
