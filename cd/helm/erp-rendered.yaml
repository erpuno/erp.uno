apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-uno
  namespace: erp-uno
  labels:
    helm.sh/chart: erp-uno-2024.6.15
    app.kubernetes.io/name: erp-uno
    app.kubernetes.io/instance: erp-uno
    app.kubernetes.io/version: "2024.6.15"
    app.kubernetes.io/managed-by: Helm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - "erp.uno"
    secretName: erp-uno-tls
  rules:
  - host: "erp.uno"
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nitro-portal
            port:
              number: 8510
      - path: /api/bpe
        pathType: Prefix
        backend:
          service:
            name: rest-bpe
            port:
              number: 8303
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: ias-auth
            port:
              number: 8204
      - path: /lms
        pathType: Prefix
        backend:
          service:
            name: lms-education
            port:
              number: 8506
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: hl7-health
            port:
              number: 8502
      - path: /documents
        pathType: Prefix
        backend:
          service:
            name: crm-documents
            port:
              number: 8503
