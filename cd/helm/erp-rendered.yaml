# Source: erp-uno/templates/networkpolicy.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: erp-uno-allow-internal
  namespace: erp-uno
  labels:
    helm.sh/chart: erp-uno-2024.6.15
    app.kubernetes.io/name: erp-uno
    app.kubernetes.io/instance: erp-uno
    app.kubernetes.io/version: "2024.6.15"
    app.kubernetes.io/managed-by: Helm
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from same namespace
  - from:
    - podSelector: {}
  # Allow from Ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  # Allow to same namespace
  - to:
    - podSelector: {}
  # Allow DNS
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
  # Allow to external (for image pulls, etc.)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443

