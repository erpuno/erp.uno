global:
  domain: erp.uno
  environment: production
  registry: docker.io
  imagePullPolicy: IfNotPresent
  version: "2024.6.15"

services:
  # Disable all custom BEAM apps
  lms-education:
    enabled: false
  hl7-health:
    enabled: false
  crm-documents:
    enabled: false
  acc-accounting:
    enabled: false
  wms-warehouse:
    enabled: false
  cart-registers:
    enabled: false
  ai-generation:
    enabled: false
  olap-analytics:
    enabled: false
  pm-projects:
    enabled: false
  itsm-incidents:
    enabled: false
  
  # Disable infrastructure services (no public images)
  ns-dns:
    enabled: false
  ca-pki:
    enabled: false
  vpn-wireguard:
    enabled: false
  ldap-directory:
    enabled: false
  ias-auth:
    enabled: false
  chat-messenger:
    enabled: false
  mail-delivery:
    enabled: false
  rest-bpe:
    enabled: false
  abac-clearance:
    enabled: false
  mach-ivr:
    enabled: false
  bpe-engine:
    enabled: false
  kvs-database:
    enabled: false
  nitro-portal:
    enabled: false
  n2o-server:
    enabled: false
  faiss-search:
    enabled: false
  otel-collector:
    enabled: false

  # Keep only public monitoring
  prometheus:
    enabled: true
  grafana:
    enabled: true
  loki:
    enabled: false

namespace: erp-uno
rbac:
  create: true
networkPolicy:
  enabled: false
ingress:
  enabled: false
