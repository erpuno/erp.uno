{{- range $name, $service := .Values.services }}
{{- if and $service.enabled $service.hpa (and $service.hpa $service.hpa.enabled) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "erp-uno.labels" $ | nindent 4 }}
    service: {{ $name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    {{- if eq $service.type "stateless" }}
    kind: Deployment
    {{- else }}
    kind: StatefulSet
    {{- end }}
    name: {{ $name }}
  minReplicas: {{ $service.hpa.minReplicas | default 1 }}
  maxReplicas: {{ $service.hpa.maxReplicas | default 10 }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ $service.hpa.targetCPUUtilization | default 75 }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
{{- end }}
{{- end }}
