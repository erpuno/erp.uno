{{- range $name, $service := .Values.services }}
{{- if and $service.enabled (eq $service.type "stateful") }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "erp-uno.labels" $ | nindent 4 }}
    service: {{ $name }}
spec:
  serviceName: {{ $name }}
  replicas: {{ $service.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "erp-uno.serviceSelectorLabels" (merge (dict "service" $name) $) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "erp-uno.serviceSelectorLabels" (merge (dict "service" $name) $) | nindent 8 }}
    spec:
      serviceAccountName: {{ $.Values.namespace }}-sa
      containers:
      - name: {{ $name }}
        image: {{ $.Values.global.registry }}/{{ $service.image }}
        imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
        {{- if $service.port }}
        ports:
        - name: http
          containerPort: {{ $service.port }}
          protocol: TCP
        {{- else if $service.ports }}
        ports:
        {{- range $portName, $portNum := $service.ports }}
        - name: {{ $portName }}
          containerPort: {{ $portNum }}
          protocol: TCP
        {{- end }}
        {{- end }}
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_ORDINAL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['statefulset.kubernetes.io/pod-index']
        {{- if $service.backend }}
        - name: KVS_BACKEND
          value: {{ $service.backend }}
        {{- end }}
        {{- if and $service.probes.enabled }}
        livenessProbe:
          httpGet:
            path: {{ $service.probes.path | default "/health" }}
            port: http
          initialDelaySeconds: {{ $service.probes.initialDelaySeconds | default 15 }}
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: {{ $service.probes.path | default "/health" }}
            port: http
          initialDelaySeconds: {{ $service.probes.initialDelaySeconds | default 10 }}
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        {{- end }}
        {{- include "erp-uno.resources" (merge (dict "type" "stateful" "resources" $service.resources "defaults" $.Values.global.defaults) $) | nindent 8 }}
        {{- if and $service.persistence $service.persistence.enabled }}
        volumeMounts:
        - name: data
          mountPath: {{ $service.persistence.mountPath }}
        {{- end }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: service
                  operator: In
                  values:
                  - {{ $name }}
              topologyKey: kubernetes.io/hostname
  {{- if and $service.persistence $service.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        {{- include "erp-uno.labels" $ | nindent 8 }}
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: {{ $.Values.global.storage.storageClass }}
      resources:
        requests:
          storage: {{ $service.persistence.size | default $.Values.global.storage.size }}
  {{- end }}
{{- end }}
{{- end }}
