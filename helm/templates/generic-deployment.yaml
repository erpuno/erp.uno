{{- $standardComponents := list "lms-education" "hl7-health" "crm-documents" "acc-accounting" "wms-warehouse" "cart-registers" "olap-analytics" "pm-projects" "itsm-incidents" "ldap-directory" "ias-auth" "chat-messenger" "mail-delivery" "rest-bpe" "abac-clearance" "mach-ivr" "bpe-engine" "kvs-database" "nitro-portal" "n2o-server" "faiss-search" -}}

{{- range $component := $standardComponents }}
{{- $config := index $.Values $component }}
{{- if $config.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $component }}
  namespace: {{ $.Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ $component }}
    app.kubernetes.io/part-of: erp-uno
    {{- include "erp-uno.labels" $ | nindent 4 }}
spec:
  replicas: {{ $config.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $component }}
  template:
    metadata:
      labels:
        app: {{ $component }}
    spec:
      containers:
        - name: {{ $component }}
          image: "{{ $.Values.global.containerLinux.registry }}/{{ $config.image.repository }}:{{ $config.image.tag }}"
          imagePullPolicy: {{ $.Values.global.containerLinux.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ $config.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ $config.port | quote }}
            - name: DOMAIN
              value: {{ $.Values.global.domain | quote }}
            - name: ENVIRONMENT
              value: {{ $.Values.global.environment | quote }}
            {{- if $config.kvs }}
            - name: KVS_DBA
              value: {{ $config.kvs.dba | quote }}
            {{- end }}
            {{- if $config.bpe }}
            - name: BPE_ENGINE
              value: {{ $config.bpe.engine | quote }}
            {{- end }}
            {{- if eq $component "ias-auth" }}
            - name: VPN_ADMIN_URL
              value: {{ $config.vpnAdminUrl | quote }}
            - name: VPN_NODE
              value: {{ $config.vpnNode | quote }}
            {{- end }}
          resources:
            {{- toYaml $config.resources | nindent 12 }}
{{- end }}
{{- end }}
