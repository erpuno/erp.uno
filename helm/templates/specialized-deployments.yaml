{{- $nsConfig := index .Values "ns-dns" }}
{{- if $nsConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ns-dns
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ns-dns
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  replicas: {{ $nsConfig.replicaCount }}
  selector:
    matchLabels:
      app: ns-dns
  template:
    metadata:
      labels:
        app: ns-dns
    spec:
      containers:
        - name: ns-dns
          image: "{{ .Values.global.containerLinux.registry }}/{{ $nsConfig.image.repository }}:{{ $nsConfig.image.tag }}"
          imagePullPolicy: {{ .Values.global.containerLinux.pullPolicy }}
          ports:
            - containerPort: {{ $nsConfig.ports.dnsUdp }}
              name: dns-udp
              protocol: UDP
            - containerPort: {{ $nsConfig.ports.dnsTcp }}
              name: dns-tcp
              protocol: TCP
          env:
            - name: ZONES_PATH
              value: {{ $nsConfig.zonesFile | quote }}
            - name: DNSSEC_ENABLED
              value: {{ $nsConfig.dnssec | quote }}
            - name: USE_ROOT_HINTS
              value: {{ $nsConfig.useRootHints | quote }}
          resources:
            {{- toYaml $nsConfig.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ns-dns
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ns-dns
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 53
      targetPort: {{ $nsConfig.ports.dnsUdp }}
      protocol: UDP
      name: dns-udp
    - port: 53
      targetPort: {{ $nsConfig.ports.dnsTcp }}
      protocol: TCP
      name: dns-tcp
  selector:
    app: ns-dns
{{- end }}

{{- $caConfig := index .Values "ca-pki" }}
{{- if $caConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ca-pki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ca-pki
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  replicas: {{ $caConfig.replicaCount }}
  selector:
    matchLabels:
      app: ca-pki
  template:
    metadata:
      labels:
        app: ca-pki
    spec:
      containers:
        - name: ca-pki
          image: "{{ .Values.global.containerLinux.registry }}/{{ $caConfig.image.repository }}:{{ $caConfig.image.tag }}"
          imagePullPolicy: {{ .Values.global.containerLinux.pullPolicy }}
          ports:
            {{- range $serviceName := $caConfig.services }}
            {{- $portValue := index $caConfig.ports $serviceName }}
            - containerPort: {{ $portValue }}
              name: {{ $serviceName | trunc 15 }}
              protocol: TCP
            {{- end }}
          env:
            - name: CA_SERVICES
              value: "{{ join "," $caConfig.services }}"
          resources:
            {{- toYaml $caConfig.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: ca-pki
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ca-pki
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    {{- range $serviceName := $caConfig.services }}
    {{- $portValue := index $caConfig.ports $serviceName }}
    - port: {{ $portValue }}
      targetPort: {{ $portValue }}
      protocol: TCP
      name: {{ $serviceName | trunc 15 }}
    {{- end }}
  selector:
    app: ca-pki
{{- end }}

{{- $vpnConfig := index .Values "vpn-wireguard" }}
{{- if $vpnConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vpn-wireguard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vpn-wireguard
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  replicas: {{ $vpnConfig.replicaCount }}
  selector:
    matchLabels:
      app: vpn-wireguard
  template:
    metadata:
      labels:
        app: vpn-wireguard
    spec:
      containers:
        - name: vpn-wireguard
          image: "{{ .Values.global.containerLinux.registry }}/{{ $vpnConfig.image.repository }}:{{ $vpnConfig.image.tag }}"
          imagePullPolicy: {{ .Values.global.containerLinux.pullPolicy }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - SYS_MODULE
          ports:
            - containerPort: {{ $vpnConfig.httpPort }}
              name: http
              protocol: TCP
            {{- range $peer := $vpnConfig.peers }}
            - containerPort: {{ $peer.localUdpPort }}
              name: {{ $peer.id | replace "_" "-" | trunc 15 }}
              protocol: UDP
            {{- end }}
          resources:
            {{- toYaml $vpnConfig.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: vpn-wireguard
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: vpn-wireguard
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $vpnConfig.httpPort }}
      targetPort: {{ $vpnConfig.httpPort }}
      protocol: TCP
      name: http
    {{- range $peer := $vpnConfig.peers }}
    - port: {{ $peer.localUdpPort }}
      targetPort: {{ $peer.localUdpPort }}
      protocol: UDP
      name: {{ $peer.id | replace "_" "-" | trunc 15 }}
    {{- end }}
  selector:
    app: vpn-wireguard
{{- end }}

{{- $aiConfig := index .Values "ai-generation" }}
{{- if $aiConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-generation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ai-generation
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  replicas: {{ $aiConfig.replicaCount }}
  selector:
    matchLabels:
      app: ai-generation
  template:
    metadata:
      labels:
        app: ai-generation
    spec:
      containers:
        - name: ai-generation
          image: "{{ .Values.global.containerLinux.registry }}/{{ $aiConfig.image.repository }}:{{ $aiConfig.image.tag }}"
          imagePullPolicy: {{ .Values.global.containerLinux.pullPolicy }}
          ports:
            - containerPort: {{ $aiConfig.port }}
              name: http
              protocol: TCP
          resources:
            limits:
              cpu: {{ $aiConfig.resources.limits.cpu }}
              memory: {{ $aiConfig.resources.limits.memory }}
              {{- if $aiConfig.gpu.enabled }}
              {{ $aiConfig.gpu.resourceName }}: {{ $aiConfig.gpu.limit }}
              {{- end }}
            requests:
              cpu: {{ $aiConfig.resources.requests.cpu }}
              memory: {{ $aiConfig.resources.requests.memory }}
              {{- if $aiConfig.gpu.enabled }}
              {{ $aiConfig.gpu.resourceName }}: {{ $aiConfig.gpu.limit }}
              {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-generation
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: ai-generation
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ $aiConfig.port }}
      targetPort: {{ $aiConfig.port }}
      protocol: TCP
      name: http
  selector:
    app: ai-generation
{{- end }}

{{- if .Values.prometheus.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-prometheus-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "erp-uno.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: prometheus
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.prometheus.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: "{{ .Values.global.containerLinux.registry }}/{{ .Values.prometheus.image.repository }}:{{ .Values.prometheus.image.tag }}"
          ports:
            - containerPort: {{ .Values.prometheus.port }}
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: prometheus
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.prometheus.port }}
      targetPort: {{ .Values.prometheus.port }}
      name: http
  selector:
    app: prometheus
{{- end }}

