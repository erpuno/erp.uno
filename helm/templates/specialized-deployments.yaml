{{- if .Values.env.otelCollectorEnabled | default .Values.global.otelCollectorEnabled | default true }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-otel-collector-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "erp-uno.labels" . | nindent 4 }}
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      batch:
    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
      otlp/loki:
        endpoint: http://loki:3100/loki/api/v1/push
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/loki]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  replicas: {{ index .Values "otel-collector" "replicaCount" | default 1 }}
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.global.containerLinux.registry }}/{{ index .Values "otel-collector" "image" "repository" }}:{{ index .Values "otel-collector" "image" "tag" }}"
          command:
            - "/otelfreecol"
            - "--config=/conf/otel-collector-config.yaml"
          ports:
            - containerPort: {{ index .Values "otel-collector" "ports" "grpc" }}
              name: otlp-grpc
            - containerPort: {{ index .Values "otel-collector" "ports" "http" }}
              name: otlp-http
            - containerPort: {{ index .Values "otel-collector" "ports" "metrics" }}
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /conf
          resources:
            {{- toYaml (index .Values "otel-collector" "resources") | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: otel-collector
    {{- include "erp-uno.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ index .Values "otel-collector" "ports" "grpc" }}
      targetPort: {{ index .Values "otel-collector" "ports" "grpc" }}
      name: otlp-grpc
    - port: {{ index .Values "otel-collector" "ports" "http" }}
      targetPort: {{ index .Values "otel-collector" "ports" "http" }}
      name: otlp-http
    - port: {{ index .Values "otel-collector" "ports" "metrics" }}
      targetPort: {{ index .Values "otel-collector" "ports" "metrics" }}
      name: metrics
  selector:
    app: otel-collector
{{- end }}


