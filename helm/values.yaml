# Default values for erp-uno.
# This is a YAML-formatted file.

global:
  domain: erp.uno
  environment: production
  containerLinux:
    registry: registry.erp.uno
    repository: alpine
    tag: "3.20"
    pullPolicy: IfNotPresent

# DNS Server (synrc/ns)
ns-dns:
  enabled: true
  replicaCount: 1
  image:
    repository: erpuno/ns
    tag: 10.7.1
  ports:
    dns-udp: 53
    dns-tcp: 53
  dnssec: true
  useRootHints: false
  zonesFile: "/opt/ns/priv/erp.zone.config"
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 50m
      memory: 32Mi

# Certificate Authority (synrc/ca)
ca-pki:
  enabled: true
  replicaCount: 1
  image:
    repository: erpuno/ca
    tag: 10.7.1
  services:
    - issuer
    - wallet
    - verifier
    - est
    - cmp
    - cmc
    - ocsp
    - tsp
  ports:
    issuer: 8107
    wallet: 8108
    verifier: 8109
    est: 8047
    cmp: 8829
    cmc: 5318
    ocsp: 8020
    tsp: 8021
    ldap: 8389
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# VPN wireguard service (zencrypted/vpn)
vpn-wireguard:
  enabled: true
  replicaCount: 1
  image:
    repository: zencrypted/vpn
    tag: 1.2.0
  httpPort: 8080
  peers:
    - id: peer_a
      ip: "10.20.20.1"
      localUdpPort: 5555
      remoteIp: "10.0.0.11"
      remoteUdpPort: 5556
    - id: peer_b
      ip: "10.20.20.2"
      localUdpPort: 5556
      remoteIp: "10.0.0.10"
      remoteUdpPort: 5555
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# LDAP Directory (synrc/ldap)
ldap-directory:
  enabled: true
  replicaCount: 1
  image:
    repository: erpuno/ldap
    tag: 1.0.0
  port: 8189
  instance: "D4252CF20538EC22"
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# Identity & Session Auth (zencrypted/ias)
ias-auth:
  enabled: true
  replicaCount: 2
  image:
    repository: zencrypted/ias
    tag: 2.1.0
  port: 8120
  vpnAdminUrl: "http://vpn-wireguard:8080/api/admin/summary"
  vpnNode: "vpn@vpn-wireguard.erp.uno"
  kvs:
    dba: kvs_mnesia
    media: disc_copies
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

